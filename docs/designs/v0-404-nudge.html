<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not yet in the archive — Willipedia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=EB+Garamond+SC&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,200..700,0..100,0..1;1,9..144,200..700,0..100,0..1&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #F4EDE0;
    --ink: #1A1510;
    --oxblood: #8B1A1A;
    --muted: #6B5D4D;
    --rule: rgba(26, 21, 16, 0.12);
    --rule-strong: rgba(26, 21, 16, 0.32);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #14110D;
      --ink: #E8DFCE;
      --oxblood: #C67B5C;
      --rule-color: #A54A3E;
      --muted: #9A8D7A;
      --rule: rgba(232, 223, 206, 0.14);
      --rule-strong: rgba(232, 223, 206, 0.32);
    }
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 20, "wght" 400, "SOFT" 50, "WONK" 0;
    font-feature-settings: "onum" 1, "kern" 1, "liga" 1;
    font-size: 19px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  @media (prefers-color-scheme: dark) {
    body { font-variation-settings: "opsz" 20, "wght" 400, "SOFT" 30, "WONK" 0; }
  }

  .sheet {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
    padding: 48px 56px 40px;
    flex: 1 0 auto;
    display: flex;
    flex-direction: column;
  }

  /* ---------- masthead ---------- */

  .masthead {
    text-align: center;
    padding-bottom: 14px;
  }

  .wordmark {
    font-family: "EB Garamond", Georgia, serif;
    font-weight: 500;
    color: var(--oxblood);
    font-size: clamp(56px, 10vw, 96px);
    letter-spacing: 0.02em;
    line-height: 1;
    margin: 0;
    font-feature-settings: "kern" 1;
  }

  .masthead-rule {
    border: 0;
    border-top: 1.5px solid var(--oxblood);
    border-bottom: 1.5px solid var(--oxblood);
    height: 5px;
    margin: 14px 0 12px;
  }

  .metadata {
    font-family: "EB Garamond SC", "EB Garamond", Georgia, serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--ink);
    text-transform: uppercase;
    padding: 0 6px;
  }

  .metadata .sep { color: var(--muted); margin: 0 0.8em; }

  /* ---------- page body ---------- */

  .archive-kicker {
    font-family: "EB Garamond SC", "EB Garamond", Georgia, serif;
    color: var(--oxblood);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    margin: 40px 0 14px;
  }

  .split {
    display: grid;
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
    gap: 48px;
    align-items: center;
    margin-bottom: 56px;
  }

  .illustration {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 12px;
  }

  .illustration svg {
    width: 100%;
    height: auto;
    max-width: 380px;
    display: block;
  }

  /* The etched drawer lines. Use currentColor so it tracks ink in dark mode. */
  .drawer { color: var(--ink); }
  .drawer .edge { stroke: currentColor; stroke-width: 1.3; fill: none; stroke-linejoin: miter; }
  .drawer .inner-edge { stroke: currentColor; stroke-width: 0.6; fill: none; }
  .drawer .label { stroke: currentColor; stroke-width: 0.9; fill: none; }
  .drawer .pull { stroke: currentColor; stroke-width: 1.0; fill: none; }
  .drawer .hatch { stroke: currentColor; stroke-width: 0.42; fill: none; opacity: 0.85; }
  .drawer .hatch-light { stroke: currentColor; stroke-width: 0.35; fill: none; opacity: 0.55; }
  .drawer .shadow { stroke: currentColor; stroke-width: 0.45; fill: none; }

  .text-col { min-width: 0; }

  .headline {
    font-family: "EB Garamond", Georgia, serif;
    font-weight: 500;
    font-size: clamp(40px, 6vw, 64px);
    line-height: 1.04;
    letter-spacing: -0.006em;
    color: var(--ink);
    margin: 0 0 20px;
  }
  .headline em { font-style: italic; font-weight: 500; }

  .deck {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 28, "wght" 400, "SOFT" 50;
    font-style: italic;
    font-size: 20px;
    line-height: 1.5;
    color: var(--ink);
    margin: 0 0 32px;
    max-width: 56ch;
  }
  .deck .slug {
    font-style: italic;
    font-variation-settings: "opsz" 28, "wght" 500, "SOFT" 50;
    color: var(--ink);
  }
  .deck .slug::before { content: "\201C"; }
  .deck .slug::after  { content: "\201D"; }

  /* ---------- CTA ---------- */

  .cta {
    display: inline-block;
    padding: 18px 26px;
    max-width: 320px;
    border: 1.8px solid var(--oxblood);
    border-radius: 2px;
    background: transparent;
    color: var(--oxblood);
    font-family: "EB Garamond SC", "EB Garamond", Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.14em;
    line-height: 1.35;
    text-transform: uppercase;
    text-align: center;
    cursor: pointer;
    font-feature-settings: "kern" 1;
    transition: background-color 120ms ease, color 120ms ease;
    appearance: none;
    -webkit-appearance: none;
  }
  .cta:hover, .cta:focus-visible {
    background: var(--oxblood);
    color: var(--paper);
    outline: none;
  }
  .cta:focus-visible {
    outline: 2px dotted var(--oxblood);
    outline-offset: 3px;
  }
  .cta[data-state="queued"] {
    background: var(--oxblood);
    color: var(--paper);
    cursor: default;
  }

  .subline {
    margin: 20px 0 0;
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
    max-width: 56ch;
  }

  /* ---------- wikilinks ---------- */

  .wikilink {
    font-family: "EB Garamond SC", "EB Garamond", Georgia, serif;
    font-style: normal;
    color: inherit;
    letter-spacing: 0.08em;
    text-decoration: none;
    padding-bottom: 1px;
    background-image: linear-gradient(to right, var(--oxblood) 40%, transparent 40%);
    background-size: 4px 1px;
    background-repeat: repeat-x;
    background-position: 0 1.1em;
    transition: color 120ms ease;
  }
  .wikilink:hover {
    color: var(--oxblood);
    background-image: linear-gradient(to right, var(--oxblood), var(--oxblood));
  }
  .wikilink:focus-visible {
    outline: 2px dotted var(--oxblood);
    outline-offset: 2px;
  }

  /* ---------- footer ---------- */

  .footer {
    border-top: 1px solid var(--rule);
    margin-top: auto;
    padding-top: 18px;
    text-align: center;
    font-family: "EB Garamond SC", "EB Garamond", Georgia, serif;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .footer a {
    color: inherit;
    text-decoration: none;
    padding: 4px 2px;
    background-image: linear-gradient(to right, var(--oxblood) 40%, transparent 40%);
    background-size: 4px 1px;
    background-repeat: repeat-x;
    background-position: 0 100%;
  }
  .footer a:hover { color: var(--oxblood); }
  .footer .sep { margin: 0 0.8em; color: var(--rule-strong); }

  /* ---------- responsive ---------- */

  @media (max-width: 900px) {
    .sheet { padding: 36px 32px 28px; }
    .split {
      grid-template-columns: minmax(0, 1fr);
      gap: 24px;
    }
    .illustration { order: 2; max-width: 320px; margin: 0 auto; }
    .text-col { order: 1; }
    .deck, .subline { max-width: none; }
  }

  @media (max-width: 560px) {
    .sheet { padding: 28px 22px 24px; }
    .archive-kicker { margin-top: 36px; }
    .metadata {
      font-size: 11px;
      letter-spacing: 0.12em;
      line-height: 1.8;
    }
    .metadata .sep { margin: 0 0.5em; }
    .cta { width: 100%; padding: 16px 18px; font-size: 13px; }
    .footer .sep { margin: 0 0.4em; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition: none !important;
      animation: none !important;
    }
  }

  /* Focus rings */
  :focus-visible {
    outline: 2px dotted var(--oxblood);
    outline-offset: 2px;
  }

  /* Contenteditable affordance */
  [contenteditable="true"] {
    outline: none;
  }
  [contenteditable="true"]:focus {
    background: rgba(139, 26, 26, 0.06);
    border-radius: 1px;
  }
</style>
</head>

</div>

<script type="module">
  import { prepare, layout } from './pretext.js';

  // ---------- Pretext wiring ----------

  // All `[data-pretext]` elements reflow on resize / edit.
  const nodes = Array.from(document.querySelectorAll('[data-pretext]'));
  const handles = new WeakMap();

  function fontString(el) {
    const cs = getComputedStyle(el);
    // CSS font shorthand Pretext needs. Build it ourselves because the computed
    // `font` shorthand is sometimes empty when font-variation-settings is applied.
    const weight = cs.fontWeight || '400';
    const style = cs.fontStyle || 'normal';
    const size = cs.fontSize || '16px';
    const family = cs.fontFamily || 'serif';
    return `${style} ${weight} ${size} ${family}`;
  }

  function lineHeightPx(el) {
    const cs = getComputedStyle(el);
    const lh = cs.lineHeight;
    if (lh.endsWith('px')) return parseFloat(lh);
    const fs = parseFloat(cs.fontSize) || 16;
    // 'normal' → ~1.2 for most serifs. We set explicit line-height on the
    // specific elements that need Pretext, so this fallback is rarely hit.
    if (lh === 'normal') return fs * 1.2;
    return fs * parseFloat(lh);
  }

  async function prepareAll() {
    await document.fonts.ready;
    for (const el of nodes) {
      handles.set(el, prepare(el.textContent, fontString(el)));
    }
  }

  function relayout() {
    for (const el of nodes) {
      const h = handles.get(el);
      if (!h) continue;
      const width = el.clientWidth;
      if (width <= 0) continue;
      const lh = lineHeightPx(el);
      const { height } = layout(h, width, lh);
      // Only set height on block-level text nodes — headline, deck, subline.
      // Inline nodes (metadata, wordmark) are allowed to size naturally.
      if (el.tagName === 'H2' || el.tagName === 'P') {
        el.style.minHeight = `${height}px`;
      }
    }
  }

  // Re-prepare on content edit (contenteditable slug).
  const editables = document.querySelectorAll('[contenteditable="true"]');
  for (const el of editables) {
    el.addEventListener('input', () => {
      // Re-prepare any [data-pretext] ancestor so its layout is correct.
      let parent = el.closest('[data-pretext]');
      while (parent) {
        handles.set(parent, prepare(parent.textContent, fontString(parent)));
        parent = parent.parentElement?.closest('[data-pretext]');
      }
      relayout();
    });
  }

  // ---------- CTA click: local jsonl fallback (PR#2 is not landed) ----------

  document.getElementById('nudge-cta')?.addEventListener('click', (ev) => {
    const btn = ev.currentTarget;
    if (btn.dataset.state === 'queued') return;
    const slugEl = document.querySelector('.deck .slug');
    const slug = (slugEl?.textContent || '').trim();
    if (!slug) return;

    const record = {
      slug,
      ts: new Date().toISOString(),
      path: location.pathname,
      referrer: document.referrer || null,
    };

    // Try the nudge endpoint. If it fails, fall back to localStorage jsonl.
    // Rendering path is isolated: a nudge write failure must not break the page.
    try {
      fetch('/api/nudge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(record),
        keepalive: true,
      }).catch(() => appendLocal(record));
    } catch (_) {
      appendLocal(record);
    }

    btn.dataset.state = 'queued';
    btn.textContent = 'Queued for drafting';
  });

  function appendLocal(rec) {
    try {
      const key = 'willipedia.nudges.jsonl';
      const line = JSON.stringify(rec) + '\n';
      const existing = localStorage.getItem(key) || '';
      localStorage.setItem(key, existing + line);
    } catch (_) { /* storage full or disabled — drop silently */ }
  }

  // ---------- Lifecycle ----------

  await prepareAll();
  relayout();

  // Re-layout on viewport resize.
  let rafId = 0;
  new ResizeObserver(() => {
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(relayout);
  }).observe(document.body);
</script>

</body>
</html>
